<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLITHER.IO CLONE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050a0f;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
    color: #00ff88;
  }

  #gameCanvas {
    display: block;
    cursor: none;
  }

  #ui {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  #score-panel {
    position: fixed;
    top: 20px; left: 20px;
    background: rgba(0,255,136,0.05);
    border: 1px solid rgba(0,255,136,0.3);
    border-radius: 4px;
    padding: 12px 20px;
    backdrop-filter: blur(10px);
  }

  #score-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(0,255,136,0.5);
    text-transform: uppercase;
  }

  #score-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: #00ff88;
    text-shadow: 0 0 20px #00ff88;
    line-height: 1;
    margin-top: 4px;
  }

  #length-panel {
    position: fixed;
    top: 20px; right: 20px;
    background: rgba(0,200,255,0.05);
    border: 1px solid rgba(0,200,255,0.3);
    border-radius: 4px;
    padding: 12px 20px;
    backdrop-filter: blur(10px);
    text-align: right;
  }

  #length-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(0,200,255,0.5);
    text-transform: uppercase;
  }

  #length-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: #00c8ff;
    text-shadow: 0 0 20px #00c8ff;
    line-height: 1;
    margin-top: 4px;
  }

  #leaderboard {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 200px;
    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 12px;
    backdrop-filter: blur(10px);
  }

  #leaderboard h3 {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    margin-bottom: 10px;
    text-align: center;
  }

  .lb-entry {
    display: flex;
    align-items: center;
    padding: 4px 0;
    font-size: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .lb-rank {
    width: 20px;
    color: rgba(255,255,255,0.3);
    font-size: 10px;
  }

  .lb-name {
    flex: 1;
    color: rgba(255,255,255,0.7);
  }

  .lb-score {
    color: #00ff88;
    font-size: 11px;
  }

  .lb-entry.me .lb-name { color: #00ff88; font-weight: bold; }
  .lb-entry.me .lb-score { color: #ffdd00; }

  #overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(5,10,15,0.92);
    z-index: 100;
    backdrop-filter: blur(4px);
    pointer-events: all;
  }

  #overlay h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(36px, 6vw, 72px);
    font-weight: 900;
    letter-spacing: 8px;
    background: linear-gradient(135deg, #00ff88, #00c8ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 0 30px rgba(0,255,136,0.5));
    margin-bottom: 8px;
  }

  #overlay .subtitle {
    font-size: 13px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.3);
    margin-bottom: 50px;
    text-transform: uppercase;
  }

  #name-input-wrapper {
    margin-bottom: 30px;
  }

  #name-input-wrapper label {
    display: block;
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(0,255,136,0.5);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  #player-name {
    background: rgba(0,255,136,0.05);
    border: 1px solid rgba(0,255,136,0.4);
    color: #00ff88;
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    padding: 12px 24px;
    border-radius: 4px;
    outline: none;
    text-align: center;
    width: 280px;
    transition: border-color 0.3s;
  }

  #player-name:focus { border-color: #00ff88; box-shadow: 0 0 20px rgba(0,255,136,0.2); }

  .color-picker-row {
    display: flex;
    gap: 12px;
    margin-bottom: 40px;
    align-items: center;
  }

  .color-picker-row span {
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
  }

  .color-dot {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.2s, border-color 0.2s;
  }

  .color-dot:hover { transform: scale(1.2); }
  .color-dot.selected { border-color: white; transform: scale(1.2); }

  #start-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #050a0f;
    background: linear-gradient(135deg, #00ff88, #00c8ff);
    border: none;
    padding: 16px 48px;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    transition: transform 0.2s, box-shadow 0.2s;
    pointer-events: all;
  }

  #start-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 40px rgba(0,255,136,0.4);
  }

  #death-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(5,10,15,0.88);
    z-index: 100;
    backdrop-filter: blur(4px);
    pointer-events: all;
  }

  #death-overlay.show { display: flex; }

  #death-overlay h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 900;
    letter-spacing: 6px;
    color: #ff4466;
    text-shadow: 0 0 40px rgba(255,68,102,0.6);
    margin-bottom: 10px;
    animation: flashIn 0.4s ease-out;
  }

  #death-score {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 8px;
  }

  #death-score span {
    color: #00ff88;
    font-weight: 700;
    font-size: 24px;
  }

  #death-length {
    font-size: 14px;
    color: rgba(255,255,255,0.3);
    margin-bottom: 40px;
    letter-spacing: 2px;
  }

  #restart-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #050a0f;
    background: linear-gradient(135deg, #ff4466, #ff8844);
    border: none;
    padding: 14px 42px;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  #restart-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px rgba(255,68,102,0.4);
  }

  #controls-hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.2);
    text-align: center;
    text-transform: uppercase;
  }

  @keyframes flashIn {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .boost-indicator {
    position: fixed;
    bottom: 20px;
    right: 20px;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(255,200,0,0.6);
    text-transform: uppercase;
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui">
  <div id="score-panel">
    <div id="score-label">Länge</div>
    <div id="score-value">0</div>
  </div>
</div>

<div id="leaderboard">
  <h3>Bestenliste</h3>
  <div id="lb-list"></div>
</div>

<div id="controls-hint">Maus = Steuern &nbsp;|&nbsp; Linksklick / Leertaste = Boost</div>
<div class="boost-indicator" id="boost-ind">BOOST BEREIT</div>

<div id="overlay">
  <h1>SLITHER</h1>
  <div class="subtitle">io — Schlangen Kampf</div>
  <div id="name-input-wrapper">
    <label>Dein Name</label>
    <input type="text" id="player-name" placeholder="Spieler" maxlength="14" value="Spieler">
  </div>
  <div class="color-picker-row">
    <span>Farbe</span>
    <div class="color-dot selected" style="background:#00ff88" data-color="#00ff88,#006633"></div>
    <div class="color-dot" style="background:#00c8ff" data-color="#00c8ff,#004466"></div>
    <div class="color-dot" style="background:#ff4466" data-color="#ff4466,#660022"></div>
    <div class="color-dot" style="background:#ffdd00" data-color="#ffdd00,#665500"></div>
    <div class="color-dot" style="background:#ff8844" data-color="#ff8844,#662211"></div>
    <div class="color-dot" style="background:#cc44ff" data-color="#cc44ff,#440066"></div>
  </div>
  <button id="start-btn">SPIELEN</button>
</div>

<div id="death-overlay">
  <h2>GAME OVER</h2>
  <div id="death-score">Punkte: <span id="ds">0</span></div>
  <div id="death-length">Länge: <span id="dl">0</span></div>
  <button id="restart-btn">NOCHMAL</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// ---- CONFIG ----
const WORLD_W = 4000, WORLD_H = 4000;
const SEGMENT_RADIUS = 10;
const FOOD_COUNT = 1200;
const BOT_COUNT = 35;
const BOOST_DRAIN = 0.15;
const BOOST_REGEN = 0.12;

// ---- STATE ----
let player, bots, foods, particles, camera;
let zoom = 1.0;
let mouseX = canvas.width/2, mouseY = canvas.height/2;
let boosting = false;
let score = 0;
let gameRunning = false;
let playerColor = '#00ff88';
let playerColorDark = '#006633';
let playerName = 'Spieler';
let animId;
let boostEnergy = 100;

// ---- COLOR PICKER ----
document.querySelectorAll('.color-dot').forEach(dot => {
  dot.addEventListener('click', () => {
    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
    dot.classList.add('selected');
    const [c1, c2] = dot.dataset.color.split(',');
    playerColor = c1;
    playerColorDark = c2;
  });
});

// ---- FOOD ----
function makeFood(x, y) {
  const hue = Math.random() * 360;
  return {
    x: x ?? Math.random() * WORLD_W,
    y: y ?? Math.random() * WORLD_H,
    r: 4 + Math.random() * 4,
    color: `hsl(${hue},100%,65%)`,
    glow: `hsl(${hue},100%,80%)`,
    pulse: Math.random() * Math.PI * 2,
    value: 1
  };
}

// ---- SNAKE ----
function makeSnake(x, y, length, color, colorDark, name, isPlayer) {
  const segments = [];
  for (let i = 0; i < length; i++) {
    segments.push({ x: x - i * (SEGMENT_RADIUS * 1.5), y });
  }
  return {
    segments,
    angle: 0,
    speed: 1.8,
    color,
    colorDark,
    name,
    isPlayer,
    alive: true,
    boostEnergy: 100,
    score: 0,
    targetAngle: 0,
    // bot AI state
    botTimer: Math.random() * 100,
    botTarget: null,
  };
}

function spawnBots() {
  const botColors = [
    ['#ff4466','#660022'],['#00c8ff','#004466'],['#ffdd00','#665500'],
    ['#ff8844','#662211'],['#cc44ff','#440066'],['#44ffcc','#006644'],
    ['#ff44cc','#660044'],['#88ff44','#224400'],['#4488ff','#001166'],
    ['#ffaa44','#664400'],['#ff6644','#661100'],['#44ffff','#004444'],
    ['#ff2200','#550000'],['#00ffaa','#005533'],['#aaff00','#334400'],
    ['#ff00aa','#550033'],['#00aaff','#003355'],['#ffff00','#555500'],
    ['#ff5500','#552200'],['#aa00ff','#330055'],['#00ff44','#005511'],
    ['#ff0055','#550011'],['#55ffaa','#115533'],['#ffaa00','#553300'],
  ];
  const botNames = ['Zyklop','Cobra','Drache','Viper','Python','Anakonda','Mamba','Natter','Kreuzotter',
    'Ringelnatter','Boa','Krait','Taipan','Mokassin','Koralle','Gabun','Baumboa','Sandotter',
    'Puffotter','Königskobra','Klapperschlange','Tigerschlange','Schwarzmamba','Giftschlange',
    'Seeschlange','Baumschlange','Erdschlange','Glanzschlange','Nachtschlange','Felsviper',
    'Wüstenviper','Hornviper','Lanzenviper','Grubenotter','Eisviper'];
  bots = [];
  for (let i = 0; i < BOT_COUNT; i++) {
    const x = 400 + Math.random() * (WORLD_W - 800);
    const y = 400 + Math.random() * (WORLD_H - 800);
    const [c, cd] = botColors[i % botColors.length];
    const len = 15 + Math.floor(Math.random() * 30);
    bots.push(makeSnake(x, y, len, c, cd, botNames[i % botNames.length], false));
  }
}

// ---- PARTICLES ----
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: 2 + Math.random() * 4,
      color,
      life: 1,
      decay: 0.02 + Math.random() * 0.03
    });
  }
}

// ---- INIT ----
function init() {
  const cx = WORLD_W / 2 + (Math.random()-0.5)*500;
  const cy = WORLD_H / 2 + (Math.random()-0.5)*500;
  player = makeSnake(cx, cy, 20, playerColor, playerColorDark, playerName, true);
  player.angle = Math.random() * Math.PI * 2;
  spawnBots();
  foods = [];
  for (let i = 0; i < FOOD_COUNT; i++) foods.push(makeFood());
  particles = [];
  camera = { x: cx - canvas.width/2, y: cy - canvas.height/2 };
  zoom = 1.0;
  score = 0;
  boostEnergy = 100;
  gameRunning = true;
}

// ---- CONTROLS ----
canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
canvas.addEventListener('mousedown', e => { if (e.button === 0) boosting = true; });
canvas.addEventListener('mouseup', e => { if (e.button === 0) boosting = false; });
window.addEventListener('keydown', e => { if (e.code === 'Space') { boosting = true; e.preventDefault(); } });
window.addEventListener('keyup', e => { if (e.code === 'Space') boosting = false; });

// ---- START ----
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', () => {
  document.getElementById('death-overlay').classList.remove('show');
  startGame();
});

function startGame() {
  playerName = document.getElementById('player-name').value.trim() || 'Spieler';
  document.getElementById('overlay').style.display = 'none';
  if (animId) cancelAnimationFrame(animId);
  init();
  animId = requestAnimationFrame(loop);
}

// ---- UPDATE SNAKE ----
function updateSnake(snake, targetAngle, isBoosting) {
  if (!snake.alive) return;

  // Smooth angle
  let diff = targetAngle - snake.angle;
  while (diff > Math.PI) diff -= Math.PI * 2;
  while (diff < -Math.PI) diff += Math.PI * 2;
  const turn = Math.min(Math.abs(diff), 0.08) * Math.sign(diff);
  if (Math.abs(diff) < 0.02) snake.angle = targetAngle;
  else snake.angle += turn;

  let speed = snake.speed;
  if (isBoosting && snake.boostEnergy > 0) {
    speed *= 2.5;
    snake.boostEnergy = Math.max(0, snake.boostEnergy - BOOST_DRAIN);
    // Drop tiny food on boost
    if (Math.random() < 0.08 && snake.segments.length > 10) {
      const tail = snake.segments[snake.segments.length - 1];
      foods.push(makeFood(tail.x + (Math.random()-0.5)*10, tail.y + (Math.random()-0.5)*10));
      snake.segments.pop();
    }
  } else {
    snake.boostEnergy = Math.min(100, snake.boostEnergy + BOOST_REGEN);
  }

  // Move head
  const head = snake.segments[0];
  const nx = head.x + Math.cos(snake.angle) * speed;
  const ny = head.y + Math.sin(snake.angle) * speed;

  // Wall check
  if (nx < 0 || nx > WORLD_W || ny < 0 || ny > WORLD_H) {
    killSnake(snake);
    return;
  }

  // Follow
  for (let i = snake.segments.length - 1; i > 0; i--) {
    snake.segments[i].x = snake.segments[i-1].x;
    snake.segments[i].y = snake.segments[i-1].y;
  }
  snake.segments[0].x = nx;
  snake.segments[0].y = ny;
}

function killSnake(snake) {
  snake.alive = false;
  // Drop food
  const drop = Math.floor(snake.segments.length * 0.7);
  for (let i = 0; i < drop; i++) {
    const seg = snake.segments[Math.floor(Math.random() * snake.segments.length)];
    foods.push(makeFood(seg.x + (Math.random()-0.5)*20, seg.y + (Math.random()-0.5)*20));
  }
  spawnParticles(snake.segments[0].x, snake.segments[0].y, snake.color, 30);
}

// ---- BOT AI ----
function updateBot(bot) {
  if (!bot.alive) return;
  bot.botTimer--;

  const head = bot.segments[0];

  // Find nearest food or chase player
  let tx = head.x + Math.cos(bot.angle) * 200;
  let ty = head.y + Math.sin(bot.angle) * 200;

  if (bot.botTimer <= 0) {
    bot.botTimer = 30 + Math.random() * 60;
    // Pick nearest food
    let best = Infinity;
    for (const f of foods) {
      const d = Math.hypot(f.x - head.x, f.y - head.y);
      if (d < best && d < 400) { best = d; tx = f.x; ty = f.y; }
    }
    // Occasionally chase player if close
    if (player.alive && Math.hypot(player.segments[0].x - head.x, player.segments[0].y - head.y) < 300 && Math.random() < 0.3) {
      tx = player.segments[0].x;
      ty = player.segments[0].y;
    }
    bot.botTarget = { x: tx, y: ty };
  }

  if (bot.botTarget) { tx = bot.botTarget.x; ty = bot.botTarget.y; }

  // Avoid walls
  const margin = 150;
  if (head.x < margin) tx = head.x + 200;
  if (head.x > WORLD_W - margin) tx = head.x - 200;
  if (head.y < margin) ty = head.y + 200;
  if (head.y > WORLD_H - margin) ty = head.y - 200;

  bot.targetAngle = Math.atan2(ty - head.y, tx - head.x);
  updateSnake(bot, bot.targetAngle, Math.random() < 0.05 && bot.boostEnergy > 40);
}

// ---- COLLISION ----
const FOOD_CHECK_DIST = (SEGMENT_RADIUS + 8) * (SEGMENT_RADIUS + 8);
const HIT_DIST = (SEGMENT_RADIUS * 1.5) * (SEGMENT_RADIUS * 1.5);

function checkCollisions() {
  if (!player.alive) return;
  const ph = player.segments[0];

  // Self-collision - only check segments far enough from head (skip first 20)
  if (player.segments.length > 25) {
    for (let i = 20; i < player.segments.length; i += 2) {
      const dx = ph.x - player.segments[i].x, dy = ph.y - player.segments[i].y;
      if (dx*dx + dy*dy < HIT_DIST) { killSnake(player); return; }
    }
  }

  // Player eats food - only check nearby
  for (let i = foods.length - 1; i >= 0; i--) {
    const f = foods[i];
    const dx = ph.x - f.x, dy = ph.y - f.y;
    if (dx*dx + dy*dy < FOOD_CHECK_DIST) {
      if (player.segments.length < 500) {
        const tail = player.segments[player.segments.length - 1];
        player.segments.push({ x: tail.x, y: tail.y });
      }
      score += f.value;
      foods.splice(i, 1);
      spawnParticles(f.x, f.y, f.color, 4);
      if (foods.length < FOOD_COUNT * 0.8) foods.push(makeFood());
    }
  }

  // Bots eat food
  for (const bot of bots) {
    if (!bot.alive) continue;
    const bh = bot.segments[0];
    for (let i = foods.length - 1; i >= 0; i--) {
      const f = foods[i];
      const dx = bh.x - f.x, dy = bh.y - f.y;
      if (dx*dx + dy*dy < FOOD_CHECK_DIST) {
        const tail = bot.segments[bot.segments.length - 1];
        bot.segments.push({ x: tail.x, y: tail.y });
        bot.score++;
        foods.splice(i, 1);
        if (foods.length < FOOD_COUNT * 0.8) foods.push(makeFood());
      }
    }
  }

  // Player vs bot bodies - skip first 10 segments from head, check every 2nd, max 80
  for (const bot of bots) {
    if (!bot.alive) continue;

    // First do a rough bounding box check
    const bhead = bot.segments[0];
    if (Math.abs(bhead.x - ph.x) > 600 && Math.abs(bhead.y - ph.y) > 600) continue;

    const limit = Math.min(bot.segments.length, 80);
    for (let i = 10; i < limit; i += 2) {
      const dx = ph.x - bot.segments[i].x, dy = ph.y - bot.segments[i].y;
      if (dx*dx + dy*dy < HIT_DIST) { killSnake(player); return; }
    }
    // Bot head vs player body
    const bh = bot.segments[0];
    if (Math.abs(bh.x - ph.x) > 600 && Math.abs(bh.y - ph.y) > 600) continue;
    const plimit = Math.min(player.segments.length, 80);
    for (let i = 10; i < plimit; i += 2) {
      const dx = bh.x - player.segments[i].x, dy = bh.y - player.segments[i].y;
      if (dx*dx + dy*dy < HIT_DIST) { killSnake(bot); score += 50; break; }
    }
  }

  // Respawn dead bots
  for (let i = 0; i < bots.length; i++) {
    if (!bots[i].alive) {
      const x = 200 + Math.random() * (WORLD_W - 400);
      const y = 200 + Math.random() * (WORLD_H - 400);
      bots[i] = makeSnake(x, y, 15, bots[i].color, bots[i].colorDark, bots[i].name, false);
    }
  }
}

// ---- LEADERBOARD ----
function updateLeaderboard() {
  const entries = [{ name: playerName, score: player.segments.length, me: true }];
  for (const b of bots) entries.push({ name: b.name, score: b.segments.length, me: false });
  entries.sort((a, b) => b.score - a.score);
  const top5 = entries.slice(0, 7);
  const lb = document.getElementById('lb-list');
  lb.innerHTML = top5.map((e, i) =>
    `<div class="lb-entry${e.me?' me':''}">
      <span class="lb-rank">${i+1}</span>
      <span class="lb-name">${e.me?'▶ ':''} ${e.name}</span>
      <span class="lb-score">${e.score}</span>
    </div>`
  ).join('');
}

// ---- DRAW ----
function drawGrid() {
  ctx.strokeStyle = 'rgba(0,255,136,0.04)';
  ctx.lineWidth = 1;
  const gs = 80;
  const sx = -camera.x % gs;
  const sy = -camera.y % gs;
  ctx.beginPath();
  for (let x = sx; x < canvas.width; x += gs) { ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); }
  for (let y = sy; y < canvas.height; y += gs) { ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); }
  ctx.stroke();
}

function drawBorder() {
  const x1 = -camera.x, y1 = -camera.y;
  ctx.strokeStyle = '#00ff88';
  ctx.lineWidth = 3;
  ctx.strokeRect(x1, y1, WORLD_W, WORLD_H);
}

function drawFood(f) {
  const sx = f.x - camera.x, sy = f.y - camera.y;
  if (sx < -20 || sx > canvas.width+20 || sy < -20 || sy > canvas.height+20) return;
  ctx.beginPath();
  ctx.arc(sx, sy, f.r, 0, Math.PI * 2);
  ctx.fillStyle = f.color;
  ctx.fill();
}

function drawSnake(snake) {
  if (!snake.alive || snake.segments.length === 0) return;
  const segs = snake.segments;
  const len = segs.length;

  for (let i = len - 1; i >= 0; i--) {
    const seg = segs[i];
    const sx = seg.x - camera.x, sy = seg.y - camera.y;
    if (sx < -30 || sx > canvas.width+30 || sy < -30 || sy > canvas.height+30) continue;

    const t = i / len;
    const r = SEGMENT_RADIUS * (1 - t * 0.35);

    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.fillStyle = i === 0 ? snake.color : (i % 3 === 0 ? snake.colorDark : snake.color);
    ctx.fill();
  }

  // Eyes on head
  const head = segs[0];
  const hx = head.x - camera.x, hy = head.y - camera.y;
  const eyeOffset = SEGMENT_RADIUS * 0.5;
  const eyeR = SEGMENT_RADIUS * 0.28;
  const perpAngle = snake.angle + Math.PI/2;
  const ex1 = hx + Math.cos(perpAngle) * eyeOffset + Math.cos(snake.angle) * eyeOffset;
  const ey1 = hy + Math.sin(perpAngle) * eyeOffset + Math.sin(snake.angle) * eyeOffset;
  const ex2 = hx - Math.cos(perpAngle) * eyeOffset + Math.cos(snake.angle) * eyeOffset;
  const ey2 = hy - Math.sin(perpAngle) * eyeOffset + Math.sin(snake.angle) * eyeOffset;

  ctx.fillStyle = 'white';
  ctx.beginPath(); ctx.arc(ex1, ey1, eyeR, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(ex2, ey2, eyeR, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(ex1 + Math.cos(snake.angle)*eyeR*0.4, ey1 + Math.sin(snake.angle)*eyeR*0.4, eyeR*0.55, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(ex2 + Math.cos(snake.angle)*eyeR*0.4, ey2 + Math.sin(snake.angle)*eyeR*0.4, eyeR*0.55, 0, Math.PI*2); ctx.fill();

  // Name tag
  if (!snake.isPlayer) {
    ctx.font = '11px Share Tech Mono';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillText(snake.name, hx, hy - SEGMENT_RADIUS * 2 - 4);
  }
}

function drawParticles() {
  for (const p of particles) {
    const sx = p.x - camera.x, sy = p.y - camera.y;
    ctx.beginPath();
    ctx.arc(sx, sy, p.r * p.life, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawMinimap() {
  const mw = 140, mh = 140, mx = canvas.width - 160, my = canvas.height - 160;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(mx, my, mw, mh);
  ctx.strokeStyle = 'rgba(0,255,136,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(mx, my, mw, mh);

  // Draw food dots
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  for (const f of foods) {
    const fx = mx + (f.x / WORLD_W) * mw;
    const fy = my + (f.y / WORLD_H) * mh;
    ctx.fillRect(fx - 0.5, fy - 0.5, 1, 1);
  }

  // Draw bots
  for (const b of bots) {
    if (!b.alive) continue;
    ctx.beginPath();
    ctx.arc(mx + (b.segments[0].x / WORLD_W) * mw, my + (b.segments[0].y / WORLD_H) * mh, 2, 0, Math.PI*2);
    ctx.fillStyle = b.color;
    ctx.fill();
  }

  // Draw player
  if (player.alive && player.segments.length > 0) {
    ctx.beginPath();
    ctx.arc(mx + (player.segments[0].x / WORLD_W) * mw, my + (player.segments[0].y / WORLD_H) * mh, 3, 0, Math.PI*2);
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 6;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.font = '9px Share Tech Mono';
  ctx.textAlign = 'left';
  ctx.fillText('KARTE', mx + 4, my + 11);
}

function drawBoostBar() {
  const bw = 200, bh = 6;
  const bx = (canvas.width - bw) / 2, by = canvas.height - 30;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(bx - 1, by - 1, bw + 2, bh + 2);
  const pct = boostEnergy / 100;
  const grd = ctx.createLinearGradient(bx, 0, bx + bw, 0);
  grd.addColorStop(0, '#ffdd00');
  grd.addColorStop(1, '#ff8844');
  ctx.fillStyle = grd;
  ctx.fillRect(bx, by, bw * pct, bh);
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.font = '9px Share Tech Mono';
  ctx.textAlign = 'center';
  ctx.fillText('BOOST', canvas.width/2, by - 4);
}

// ---- MAIN LOOP ----
let frameCount = 0;
let lastTime = 0;
function loop(timestamp) {
  animId = requestAnimationFrame(loop);
  const delta = Math.min((timestamp - lastTime) / 16.67, 3); // cap delta
  lastTime = timestamp;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#050a0f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawGrid();

  if (!gameRunning) return;

  // Update player
  if (player.alive) {
    // Angle from snake head to mouse - use canvas center as reference for smooth control
    const targetAngle = Math.atan2(mouseY - canvas.height / 2, mouseX - canvas.width / 2);
    const canBoost = boosting && boostEnergy > 0;
    if (canBoost) boostEnergy = Math.max(0, boostEnergy - BOOST_DRAIN);
    else boostEnergy = Math.min(100, boostEnergy + BOOST_REGEN);
    player.boostEnergy = boostEnergy;
    updateSnake(player, targetAngle, canBoost && boostEnergy > 0);

    // Camera follow - keep snake centered accounting for zoom
    if (player.segments.length > 0) {
      const head = player.segments[0];
      const targetCamX = head.x - canvas.width / (2 * zoom);
      const targetCamY = head.y - canvas.height / (2 * zoom);
      camera.x += (targetCamX - camera.x) * 0.3;
      camera.y += (targetCamY - camera.y) * 0.3;
    }
  } else {
    // Dead
    gameRunning = false;
    document.getElementById('ds').textContent = player.segments.length;
    document.getElementById('death-length').textContent = 'Länge: ' + player.segments.length;
    document.getElementById('death-overlay').classList.add('show');
  }

  // Update bots
  for (const bot of bots) updateBot(bot);

  checkCollisions();

  // Update zoom based on snake length — bigger snake = more zoomed out
  const targetZoom = Math.max(0.18, 1.0 - (player.segments.length / 180));
  zoom += (targetZoom - zoom) * 0.04;

  // Draw (zoomed)
  ctx.save();
  ctx.translate(canvas.width / 2, canvas.height / 2);
  ctx.scale(zoom, zoom);
  ctx.translate(-canvas.width / 2, -canvas.height / 2);
  drawBorder();
  // Draw all food in one pass grouped by color
  for (const f of foods) drawFood(f);
  for (const bot of bots) drawSnake(bot);
  if (player.alive) drawSnake(player);
  ctx.restore();

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.96; p.vy *= 0.96;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
  drawParticles();
  drawMinimap();
  drawBoostBar();

  // UI update only every 10 frames
  if (frameCount % 10 === 0) {
    document.getElementById('score-value').textContent = player.segments.length;
    document.getElementById('boost-ind').style.opacity = boostEnergy > 20 ? '0.8' : '0.2';
    document.getElementById('boost-ind').textContent = boostEnergy > 20 ? 'BOOST BEREIT' : 'BOOST LÄDT...';
  }
  if (frameCount % 120 === 0) updateLeaderboard();
  frameCount++;
}

// Init leaderboard display
document.getElementById('lb-list').innerHTML = '';
</script>
